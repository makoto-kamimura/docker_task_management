# 人生のコンパス（Life Compass）開発環境
#
# 起動:  docker compose -f platform/docker-compose.yml up -d --build
# 停止:  docker compose -f platform/docker-compose.yml down
#
# web       : React + Vite フロントエンド（app/web）
# api       : Laravel API（app/api）
# scheduler : Laravel スケジューラ（毎朝通知など）
# db        : MySQL 8

name: life-compass

services:
  web:
    image: node:22-alpine
    container_name: life-compass-web
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ../app/web:/app
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - api

  api:
    build:
      context: ..
      dockerfile: platform/api.Dockerfile
    container_name: life-compass-api
    working_dir: /app
    command: sh -c "[ -d vendor ] || composer install --no-interaction; php artisan serve --host=0.0.0.0 --port=8000"
    volumes:
      - ../app/api:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: platform/api.Dockerfile
    container_name: life-compass-scheduler
    working_dir: /app
    command: sh -c "[ -d vendor ] || composer install --no-interaction; php artisan schedule:work"
    volumes:
      - ../app/api:/app
    depends_on:
      - api
      - db

  db:
    image: mysql:8.4
    container_name: life-compass-db
    environment:
      MYSQL_DATABASE: life_compass
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
